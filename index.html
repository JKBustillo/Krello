<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Krello · tablero de proyectos</title>
<meta name="theme-color" content="#141019">
<!-- the card progress rails, three projects deep. Inline so the file stays self-contained. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23141019'/%3E%3Cg fill='%23fff' opacity='.16'%3E%3Crect x='6' y='6' width='4' height='20' rx='2'/%3E%3Crect x='14' y='6' width='4' height='20' rx='2'/%3E%3Crect x='22' y='6' width='4' height='20' rx='2'/%3E%3C/g%3E%3Crect x='6' y='14' width='4' height='12' rx='2' fill='%23ff6b4a'/%3E%3Crect x='14' y='6' width='4' height='20' rx='2' fill='%2347e0a0'/%3E%3Crect x='22' y='19' width='4' height='7' rx='2' fill='%23b57bff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141019;
    --grid:rgba(255,255,255,.028);
    --surface:#1d1826;
    --surface-2:#241e31;
    --line:rgba(255,255,255,.08);
    --line-strong:rgba(255,255,255,.22);
    --ink:#efe9f5;
    --muted:#948ba6;
    --done:#47e0a0;
    --danger:#ff6b6b;
    --radius:16px;
    --display:'Bricolage Grotesque', system-ui, sans-serif;
    --body:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono:'Space Mono', ui-monospace, monospace;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    min-height:100vh;
    color:var(--ink);
    font-family:var(--body);
    line-height:1.5;
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/26px 26px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/26px 26px,
      radial-gradient(120% 90% at 15% -10%, #211830, var(--bg) 55%);
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:1280px; margin:0 auto; padding:clamp(24px,5vw,56px) clamp(18px,4vw,40px) 80px}

  /* ---- topbar / hero ---- */
  .topbar{
    display:flex; flex-wrap:wrap; gap:28px 40px;
    align-items:flex-end; justify-content:space-between;
    padding-bottom:28px; margin-bottom:36px;
    border-bottom:1px solid var(--line);
  }
  .brand h1{
    font-family:var(--display);
    font-weight:800; font-size:clamp(2.6rem,7vw,4.4rem);
    letter-spacing:-.03em; line-height:.92; margin:0;
  }
  .brand h1 .dot{color:var(--done)}
  .brand .tag{
    margin:.7rem 0 0; max-width:34ch;
    color:var(--muted); font-size:1rem;
  }
  .stats{display:flex; gap:10px; margin:0}
  .stat{
    font-family:var(--mono);
    background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:10px 16px; text-align:center; min-width:78px;
  }
  .stat b{display:block; font-size:1.7rem; font-weight:700; letter-spacing:-.02em}
  .stat span{display:block; font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-top:2px}

  /* ---- board grid ---- */
  .board{
    display:grid; gap:20px;
    grid-template-columns:repeat(auto-fill, minmax(292px,1fr));
    align-items:start;
  }

  /* ---- project card ---- */
  .card{
    display:flex; overflow:hidden;
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius);
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .card:hover{
    transform:translateY(-2px);
    border-color:var(--line-strong);
    box-shadow:0 18px 40px -24px rgba(0,0,0,.8);
  }
  /* signature: vertical progress rail, fills bottom→top with the project accent */
  .rail{position:relative; flex:none; width:6px; background:rgba(255,255,255,.06)}
  .rail-fill{
    position:absolute; left:0; right:0; bottom:0;
    background:var(--accent); border-radius:0 0 0 6px;
    transition:height .4s cubic-bezier(.4,0,.2,1);
  }
  .card-body{flex:1; min-width:0; padding:16px 16px 14px; display:flex; flex-direction:column; gap:12px}

  .card.dragging{opacity:.45; box-shadow:none}

  .card-head{display:flex; align-items:flex-start; gap:8px}
  .grip{
    flex:none; margin:2px 0 0 -3px; padding:0;
    background:none; border:none; border-radius:6px;
    color:var(--muted); font-size:.95rem; line-height:1;
    cursor:grab; opacity:0; transition:opacity .15s, color .15s;
    touch-action:none; -webkit-touch-callout:none;
  }
  /* no hover on touch, so every control that hides until hover has to stay put */
  @media (hover: none){
    .grip, .task-del, .del-project{opacity:.55}
  }
  .card:hover .grip, .grip:focus-visible{opacity:1}
  .grip:hover{color:var(--ink)}
  .grip:active{cursor:grabbing}
  .proj-title{
    flex:1; min-width:0; margin:0;
    font-family:var(--display); font-weight:700; font-size:1.2rem;
    letter-spacing:-.015em; word-break:break-word;
    outline:none; border-radius:6px;
  }
  .proj-title:focus{box-shadow:0 0 0 2px var(--accent); padding:0 4px; margin:0 -4px}
  .head-meta{display:flex; align-items:center; gap:6px; flex:none}
  .count{font-family:var(--mono); font-size:.8rem; color:var(--muted); letter-spacing:.04em}

  .icon-btn{
    display:grid; place-items:center;
    width:26px; height:26px; padding:0;
    background:none; border:none; border-radius:8px;
    color:var(--muted); font-size:.85rem; cursor:pointer;
    transition:.15s;
  }
  .icon-btn:hover{background:rgba(255,107,107,.12); color:var(--danger)}
  .del-project{opacity:0}
  .card:hover .del-project, .del-project:focus-visible{opacity:1}

  /* ---- tasks ---- */
  .tasks{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px; min-height:6px}
  .task{
    display:flex; align-items:center; gap:6px;
    padding:5px 6px; border-radius:9px;
    cursor:grab;
    transition:background .15s;
    /* a long press drags the task, so it must not select text or raise the iOS callout */
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  .task:hover{background:var(--surface-2)}
  .task.dragging{opacity:.35; cursor:grabbing; background:var(--surface-2)}
  body[data-drag="task"] .tasks{
    min-height:34px; border-radius:10px;
    outline:1.5px dashed var(--line); outline-offset:5px;
  }
  body[data-drag] .task, body[data-drag] .grip{cursor:grabbing}
  .task.is-new{animation:pop .25s ease}
  @keyframes pop{from{opacity:0; transform:translateY(-4px)}}

  .check{display:flex; align-items:center; gap:10px; flex:1; min-width:0; cursor:pointer}
  .check input{position:absolute; opacity:0; width:0; height:0}
  .box{
    flex:none; width:18px; height:18px;
    border:2px solid var(--line-strong); border-radius:6px;
    display:grid; place-items:center; transition:.18s;
  }
  .box::after{content:"✓"; font-size:12px; font-weight:700; color:#141019; opacity:0; transform:scale(.4); transition:.18s}
  .check input:checked ~ .box{background:var(--done); border-color:var(--done)}
  .check input:checked ~ .box::after{opacity:1; transform:scale(1)}
  .check input:focus-visible ~ .box{box-shadow:0 0 0 3px rgba(71,224,160,.35)}
  .text{min-width:0; word-break:break-word; transition:.18s}
  .task.is-done .text{color:var(--muted); text-decoration:line-through}

  .task-del{opacity:0; flex:none}
  .task:hover .task-del, .task-del:focus-visible{opacity:1}

  .add-task{display:flex; margin-top:2px}
  .add-input{
    flex:1; width:100%;
    background:none; border:none; border-bottom:1px solid transparent;
    color:var(--ink); font:inherit; padding:6px 6px;
    transition:border-color .18s;
  }
  .add-input::placeholder{color:var(--muted)}
  .add-input:focus{outline:none; border-bottom-color:var(--accent)}

  /* ---- ghost / new project ---- */
  .ghost{
    flex-direction:column; justify-content:center; align-items:center; gap:8px;
    min-height:132px; padding:24px;
    background:transparent; border:1.5px dashed var(--line-strong);
    color:var(--muted); text-align:center; cursor:text;
  }
  .ghost:hover{border-color:var(--done); color:var(--ink); transform:translateY(-2px)}
  .ghost-plus{font-family:var(--display); font-size:1.8rem; line-height:1; color:var(--done)}
  .ghost-input{
    width:100%; text-align:center;
    background:none; border:none; color:var(--ink);
    font-family:var(--display); font-weight:600; font-size:1.05rem;
  }
  .ghost-input::placeholder{color:var(--muted); font-weight:600}
  .ghost-input:focus{outline:none}
  .ghost-hint{font-family:var(--mono); font-size:.66rem; letter-spacing:.14em; text-transform:uppercase}

  /* ---- copy / paste the board ---- */
  .io{margin-top:56px; padding-top:22px; border-top:1px solid var(--line)}
  .io summary{
    font-family:var(--mono); font-size:.7rem; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); cursor:pointer; width:fit-content; padding:4px 2px; border-radius:6px;
  }
  .io summary:hover{color:var(--ink)}
  .io[open] summary{margin-bottom:14px; color:var(--ink)}
  .io-help{max-width:62ch; margin:0 0 12px; color:var(--muted); font-size:.9rem}
  .io-code{
    display:block; width:100%; min-height:132px; resize:vertical;
    padding:12px 14px; border-radius:12px;
    background:var(--surface); border:1px solid var(--line); color:var(--ink);
    font-family:var(--mono); font-size:.78rem; line-height:1.6;
  }
  .io-code:focus{outline:none; border-color:var(--line-strong)}
  .io-actions{display:flex; align-items:center; gap:10px; margin-top:12px; flex-wrap:wrap}
  .btn{
    font-family:var(--mono); font-size:.74rem; letter-spacing:.1em; text-transform:uppercase;
    padding:9px 16px; border-radius:10px; cursor:pointer;
    background:none; border:1px solid var(--line-strong); color:var(--ink);
    transition:.15s;
  }
  .btn:hover{border-color:var(--ink)}
  .btn-primary{background:var(--ink); border-color:var(--ink); color:#141019; font-weight:700}
  .btn-primary:hover{background:#fff; border-color:#fff}
  .io-status{font-family:var(--mono); font-size:.74rem; color:var(--muted)}
  .io-status.is-bad{color:var(--danger)}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <h1>Krello<span class="dot">.</span></h1>
        <p class="tag">Tu tablero de proyectos. Suelta las ideas aquí antes de que se te olviden.</p>
      </div>
      <dl class="stats">
        <div class="stat"><b class="stat-proj">00</b><span>proyectos</span></div>
        <div class="stat"><b class="stat-task">00</b><span>tareas</span></div>
        <div class="stat"><b class="stat-done">00</b><span>hechas</span></div>
      </dl>
    </header>
    <main id="board" class="board"></main>

    <footer>
      <details class="io" id="io">
        <summary>Copiar o pegar tablero</summary>
        <p class="io-help">Tu tablero entero, en texto. Cópialo para guardarlo o llevártelo a otro navegador. Pega uno encima y dale Importar para reemplazar lo que tienes aquí.</p>
        <textarea class="io-code" id="io-code" spellcheck="false" autocomplete="off" aria-label="Código del tablero"></textarea>
        <div class="io-actions">
          <button type="button" class="btn" id="io-copy">Copiar</button>
          <button type="button" class="btn btn-primary" id="io-import">Importar</button>
          <span class="io-status" id="io-status" role="status"></span>
        </div>
      </details>
    </footer>
  </div>

<script>
  const KEY = 'krello.v1';
  const ACCENTS = ['#ff6b4a','#ffb23e','#47e0a0','#56c2ff','#b57bff','#ff7da8'];
  const board = document.getElementById('board');

  let state = load();

  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch{ return []; } }
  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
  function uid(){ return crypto.randomUUID(); }
  function find(id){ return state.find(p => p.id === id); }
  function esc(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function pad(n){ return String(n).padStart(2,'0'); }

  function stats(p){
    const total = p.tasks.length;
    const done = p.tasks.filter(t => t.done).length;
    return { total, done, pct: total ? Math.round(done/total*100) : 0 };
  }

  const ghostHTML = `
    <form class="card ghost" id="new-project">
      <span class="ghost-plus" aria-hidden="true">+</span>
      <input class="ghost-input" type="text" placeholder="Nuevo proyecto…" autocomplete="off" aria-label="Nombre del proyecto">
      <span class="ghost-hint">Enter para crear</span>
    </form>`;

  function taskLi(t, isNew){
    return `<li class="task ${t.done ? 'is-done' : ''} ${isNew ? 'is-new' : ''}" data-task="${t.id}" draggable="true">
      <label class="check">
        <input type="checkbox" ${t.done ? 'checked' : ''} data-act="toggle">
        <span class="box" aria-hidden="true"></span>
        <span class="text">${esc(t.text)}</span>
      </label>
      <button type="button" class="icon-btn task-del" data-act="del-task" aria-label="Eliminar tarea">✕</button>
    </li>`;
  }

  // a task's owner is wherever it currently sits in the DOM, not a baked-in id
  function ownerOf(el){ return find(el.closest('.card').dataset.project); }

  function cardHTML(p){
    const s = stats(p);
    return `<article class="card" style="--accent:${p.accent}" data-project="${p.id}">
      <div class="rail"><span class="rail-fill" style="height:${s.pct}%"></span></div>
      <div class="card-body">
        <div class="card-head">
          <button type="button" class="grip" aria-label="Mover proyecto (arrastra, o usa las flechas)">⠿</button>
          <h2 class="proj-title" contenteditable="true" spellcheck="false" data-project="${p.id}">${esc(p.name)}</h2>
          <div class="head-meta">
            <span class="count">${s.done}/${s.total}</span>
            <button type="button" class="icon-btn del-project" data-act="del-project" data-project="${p.id}" aria-label="Eliminar proyecto">✕</button>
          </div>
        </div>
        <ul class="tasks">${p.tasks.map(t => taskLi(t, false)).join('')}</ul>
        <form class="add-task" data-project="${p.id}">
          <input class="add-input" type="text" placeholder="¿Qué hay que hacer?" autocomplete="off" aria-label="Nueva tarea">
        </form>
      </div>
    </article>`;
  }

  function render(){
    board.innerHTML = state.map(cardHTML).join('') + ghostHTML;
    updateHeaderStats();
  }

  function updateMeta(p){
    const card = board.querySelector(`.card[data-project="${p.id}"]`);
    if(!card) return;
    const s = stats(p);
    card.querySelector('.count').textContent = `${s.done}/${s.total}`;
    card.querySelector('.rail-fill').style.height = s.pct + '%';
    updateHeaderStats();
  }

  function updateHeaderStats(){
    const tasks = state.reduce((n,p) => n + p.tasks.length, 0);
    const done = state.reduce((n,p) => n + p.tasks.filter(t => t.done).length, 0);
    document.querySelector('.stat-proj').textContent = pad(state.length);
    document.querySelector('.stat-task').textContent = pad(tasks);
    document.querySelector('.stat-done').textContent = pad(done);
  }

  // ---- events (delegated on the board, survives re-render) ----
  board.addEventListener('submit', e => {
    e.preventDefault();
    if(e.target.id === 'new-project'){
      const input = e.target.querySelector('.ghost-input');
      const name = input.value.trim();
      if(!name) return;
      state.push({ id: uid(), name, accent: ACCENTS[state.length % ACCENTS.length], tasks: [] });
      save(); render();
      document.querySelector('#new-project .ghost-input')?.focus();
      return;
    }
    if(e.target.classList.contains('add-task')){
      const p = find(e.target.dataset.project);
      const input = e.target.querySelector('.add-input');
      const text = input.value.trim();
      if(!text) return;
      const t = { id: uid(), text, done: false };
      p.tasks.push(t); save();
      e.target.closest('.card-body').querySelector('.tasks')
        .insertAdjacentHTML('beforeend', taskLi(t, true));
      updateMeta(p);
      input.value = ''; input.focus();
    }
  });

  board.addEventListener('change', e => {
    const cb = e.target.closest('[data-act="toggle"]');
    if(!cb) return;
    const li = cb.closest('.task');
    const p = ownerOf(li);
    const t = p.tasks.find(x => x.id === li.dataset.task);
    t.done = cb.checked; save();
    li.classList.toggle('is-done', t.done);
    updateMeta(p);
  });

  board.addEventListener('click', e => {
    const btn = e.target.closest('[data-act]');
    if(!btn) return;
    if(btn.dataset.act === 'del-task'){
      const li = btn.closest('.task');
      const p = ownerOf(li);
      p.tasks = p.tasks.filter(t => t.id !== li.dataset.task);
      save(); li.remove(); updateMeta(p);
    }
    if(btn.dataset.act === 'del-project'){
      const p = find(btn.dataset.project);
      if(p.tasks.length && !confirm(`¿Eliminar “${p.name}” y sus ${p.tasks.length} tareas?`)) return;
      state = state.filter(x => x.id !== p.id);
      save(); render();
    }
  });

  // rename project (contenteditable title)
  board.addEventListener('keydown', e => {
    if(e.target.classList.contains('proj-title') && e.key === 'Enter'){
      e.preventDefault(); e.target.blur();
      return;
    }
    // arrows on the grip: the keyboard way to reorder, since dragging needs a pointer
    const grip = e.target.closest('.grip');
    const step = { ArrowLeft: -1, ArrowUp: -1, ArrowRight: 1, ArrowDown: 1 }[e.key];
    if(!grip || !step) return;
    e.preventDefault();
    const id = grip.closest('.card').dataset.project;
    const from = state.findIndex(p => p.id === id);
    const to = from + step;
    if(to < 0 || to >= state.length) return;
    [state[from], state[to]] = [state[to], state[from]];
    save(); render();
    board.querySelector(`.card[data-project="${id}"] .grip`)?.focus();
  });
  board.addEventListener('focusout', e => {
    if(!e.target.classList.contains('proj-title')) return;
    const p = find(e.target.dataset.project);
    let name = e.target.textContent.trim();
    if(!name){ name = 'Sin título'; e.target.textContent = name; }
    p.name = name; save();
  });

  // ---- drag & drop: reorder tasks and projects, and move tasks between projects ----
  // ponytail: native HTML5 DnD, no library. Mouse only — touch has no dragstart.
  let dragged = null;
  let dragKind = null;

  function startDrag(el, kind){
    dragged = el;
    dragKind = kind;
    el.classList.add('dragging');
    document.body.dataset.drag = kind;
  }

  function moveDrag(x, y){
    if(dragKind === 'task'){
      const card = document.elementFromPoint(x, y)?.closest('.card[data-project]');
      if(!card) return;
      const ul = card.querySelector('.tasks');
      ul.insertBefore(dragged, taskBefore(ul, y));
    }else{
      board.insertBefore(dragged, cardBefore(x, y));
    }
  }

  function endDrag(){
    if(!dragged) return;
    dragged.classList.remove('dragging');
    delete document.body.dataset.drag;
    dragged = null;
    dragKind = null;
    dropGrips();
    commitOrder();
  }

  // the first task whose midpoint sits below the cursor; null means "append"
  function taskBefore(ul, y){
    return [...ul.querySelectorAll('.task:not(.dragging)')]
      .find(el => { const b = el.getBoundingClientRect(); return y < b.top + b.height/2; }) || null;
  }

  // same idea across a grid: the first card the cursor sits above, or left of in its own row
  function cardBefore(x, y){
    return [...board.querySelectorAll('.card[data-project]')]
      .filter(c => c !== dragged)
      .find(c => {
        const b = c.getBoundingClientRect();
        return y < b.top || (y < b.bottom && x < b.left + b.width / 2);
      }) || document.getElementById('new-project'); // the ghost card always sits last
  }

  // a card only becomes draggable while its grip is held, so tasks stay draggable on their own
  function dropGrips(){
    board.querySelectorAll('.card[draggable="true"]').forEach(c => { c.draggable = false; });
  }

  board.addEventListener('mousedown', e => {
    const grip = e.target.closest('.grip');
    if(grip) grip.closest('.card').draggable = true;
  });
  document.addEventListener('mouseup', dropGrips);

  board.addEventListener('dragstart', e => {
    const li = e.target.closest('.task');
    const card = e.target.closest('.card[data-project]');
    if(li) startDrag(li, 'task');
    else if(card?.draggable) startDrag(card, 'card');
    else { e.preventDefault(); return; }
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', ''); // Firefox needs a payload
  });

  board.addEventListener('dragover', e => {
    if(!dragged) return;
    e.preventDefault();
    moveDrag(e.clientX, e.clientY);
  });

  board.addEventListener('drop', e => { if(dragged) e.preventDefault(); });
  board.addEventListener('dragend', endDrag);

  // ---- touch: same drag, driven by fingers ----
  // Touch fires no dragstart, so it gets its own listeners. A grip is a handle already,
  // so it drags at once; a task needs a long press, otherwise every scroll would drag it.
  const HOLD = 350, SLOP = 10;
  let hold = null, touchFrom = null;

  board.addEventListener('touchstart', e => {
    if(e.touches.length !== 1 || dragged) return;
    const t = e.touches[0];
    const grip = e.target.closest('.grip');
    if(grip){
      startDrag(grip.closest('.card[data-project]'), 'card');
      navigator.vibrate?.(8);
      return;
    }
    const li = e.target.closest('.task');
    if(!li) return;
    touchFrom = { x: t.clientX, y: t.clientY };
    hold = setTimeout(() => {
      hold = null;
      startDrag(li, 'task');
      navigator.vibrate?.(8);
    }, HOLD);
  }, { passive: true });

  board.addEventListener('touchmove', e => {
    const t = e.touches[0];
    if(!dragged){
      // moving before the hold lands means this was a scroll, not a drag
      if(hold && Math.hypot(t.clientX - touchFrom.x, t.clientY - touchFrom.y) > SLOP){
        clearTimeout(hold); hold = null;
      }
      return;
    }
    e.preventDefault(); // the gesture is ours now, so the page stops scrolling under it
    moveDrag(t.clientX, t.clientY);
    edgeScroll(t.clientY);
  }, { passive: false });

  function endTouch(e){
    clearTimeout(hold); hold = null;
    if(!dragged) return;
    e.preventDefault(); // no synthetic click, so dropping a task cannot also tick its checkbox
    endDrag();
  }
  board.addEventListener('touchend', endTouch, { passive: false });
  board.addEventListener('touchcancel', endTouch);

  // ponytail: only scrolls while the finger keeps moving. Good enough to reach an offscreen
  // project; make it a rAF loop if holding still at the edge ever needs to scroll too.
  function edgeScroll(y){
    const edge = 90;
    if(y < edge) scrollBy(0, -14);
    else if(y > innerHeight - edge) scrollBy(0, 14);
  }

  // rebuild the whole board from the DOM, but only keep it if nothing went missing
  function commitOrder(){
    const tasks = new Map();
    state.forEach(p => p.tasks.forEach(t => tasks.set(t.id, t)));
    const byId = new Map(state.map(p => [p.id, p]));

    const next = [...board.querySelectorAll('.card[data-project]')]
      .map(card => {
        const p = byId.get(card.dataset.project);
        if(!p) return null;
        return { ...p, tasks: [...card.querySelector('.tasks').children]
          .map(li => tasks.get(li.dataset.task)).filter(Boolean) };
      })
      .filter(Boolean);

    const kept = next.reduce((n, p) => n + p.tasks.length, 0);
    if(next.length !== state.length || kept !== tasks.size){
      console.error('drag: board mismatch, discarding move');
      render();
      return;
    }
    state = next;
    save();
    state.forEach(updateMeta);
  }

  // ---- copy / paste the board ----
  // ponytail: plain one-line JSON, no encoding layer. Add one if it ever gets mangled in transit.
  const io = document.getElementById('io');
  const ioCode = document.getElementById('io-code');
  const ioStatus = document.getElementById('io-status');

  // accept anything project-shaped: hand-written codes and older exports both work
  function normalize(raw){
    if(!Array.isArray(raw)) throw new Error('el código tiene que ser una lista de proyectos');
    if(raw.some(p => !p || typeof p !== 'object' || Array.isArray(p)))
      throw new Error('hay elementos que no son proyectos');
    return raw.map((p, i) => ({
      id: p.id || uid(),
      name: String(p.name ?? 'Sin título').trim() || 'Sin título',
      accent: p.accent || ACCENTS[i % ACCENTS.length],
      tasks: (Array.isArray(p.tasks) ? p.tasks : [])
        .map(t => ({ id: t.id || uid(), text: String(t.text ?? '').trim(), done: !!t.done }))
        .filter(t => t.text),
    }));
  }

  function say(msg, bad){
    ioStatus.textContent = msg;
    ioStatus.classList.toggle('is-bad', !!bad);
  }

  io.addEventListener('toggle', () => {
    if(!io.open) return;
    ioCode.value = JSON.stringify(state);
    say('');
  });

  document.getElementById('io-copy').addEventListener('click', async () => {
    ioCode.select();
    try{
      await navigator.clipboard.writeText(ioCode.value);
      say('Copiado');
    }catch{
      say('Seleccionado — dale Ctrl+C');
    }
  });

  document.getElementById('io-import').addEventListener('click', () => {
    let next;
    try{
      next = normalize(JSON.parse(ioCode.value));
    }catch(err){
      say('No pude leer el código: ' + err.message, true);
      return;
    }
    if(state.length && !confirm(`Importar reemplaza tus ${state.length} proyectos actuales. ¿Seguir?`)) return;
    state = next;
    save(); render();
    ioCode.value = JSON.stringify(state);
    say(`Importados ${state.length} proyectos`);
  });

  // ponytail: full re-render only on add/delete project; task ops patch the DOM
  function selfTest(){
    const s = stats({ tasks: [{done:true},{done:false},{done:true}] });
    console.assert(s.total === 3 && s.done === 2 && s.pct === 67, 'stats() roto', s);

    const n = normalize([{ name: 'A', tasks: [{ text: 'x', done: 1 }, { text: '  ' }] }, { name: '' }]);
    console.assert(n.length === 2, 'normalize() pierde proyectos', n);
    console.assert(n[0].tasks.length === 1 && n[0].tasks[0].done === true, 'normalize() no limpia tareas', n[0]);
    console.assert(n[1].name === 'Sin título' && n[1].tasks.length === 0, 'normalize() no rellena huecos', n[1]);
    console.assert(n[0].id && n[0].accent, 'normalize() no asigna id/accent', n[0]);

    let threw = false;
    try{ normalize('nope'); }catch{ threw = true; }
    console.assert(threw, 'normalize() debe rechazar lo que no sea una lista');

    const round = normalize(JSON.parse(JSON.stringify(n)));
    console.assert(JSON.stringify(round) === JSON.stringify(n), 'exportar→importar no es idempotente');
  }
  selfTest();
  render();
</script>
</body>
</html>
